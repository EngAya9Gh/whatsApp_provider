name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script_stop: true
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin:/usr/bin:/root/.nvm/versions/node/$(ls /root/.nvm/versions/node 2>/dev/null | head -1)/bin:/home/provider/.nvm/versions/node/$(ls /home/provider/.nvm/versions/node 2>/dev/null | head -1)/bin

            echo "--- Node version: $(node -v) ---"
            echo "--- NPM version: $(npm -v) ---"

            echo "1. Going to project directory..."
            cd /home/provider/htdocs/provider.wakeel.cc

            echo "2. Pulling latest code from GitHub..."
            git pull origin main

            echo "3. Setting up Backend..."
            npm install
            npx prisma generate

            echo "4. Building Provider Dashboard..."
            cd dashboard
            npm install
            npm run build
            cd ..

            echo "5. Building Admin Dashboard..."
            cd admin-dashboard
            npm install
            npm run build
            cd ..

            echo "6. Restarting Node.js Server..."
            pm2 restart whatsapp-api
