name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script_stop: true
          script: |
            export PATH=/home/provider/.nvm/versions/node/v22.23.1/bin:$PATH

            echo "--- Node: $(node -v) | NPM: $(npm -v) ---"

            echo "1. Going to project directory..."
            cd /home/provider/htdocs/provider.wakeel.cc

            echo "2. Pulling latest code from GitHub..."
            git pull origin main

            echo "3. Setting up Backend..."
            npm install
            npx prisma db push
            npx prisma generate

            echo "4. Building Provider Dashboard..."
            cd dashboard
            npm install
            npm run build
            cd ..

            echo "5. Building Admin Dashboard..."
            cd admin-dashboard
            npm install
            npm run build
            
            echo "6. Merging Admin Panel into Main Dashboard..."
            rm -rf ../dashboard/dist/admin
            cp -r dist ../dashboard/dist/admin
            cd ..

            echo "7. Restarting Node.js Server..."
            pm2 restart whatsapp-api
